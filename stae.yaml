apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: stae
  labels:
    app: myapp
spec:
  serviceName: "stae"
  replicas: 3
  selector:
    matchLabels:
      app: myapp
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: state-cotainer
        image: mysql:5.7
        ports:
        - name: mysql-port
          containerPort: 3306
...
---
apiVersion: v1
kind: Service 
metadata:
labels:
    app: myapp
spec:
  clusterIP: None
  selector:
    app: myapp        
  ports:
  - name: mysql-port
    protocol: TCP