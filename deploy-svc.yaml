apiVersion: apps/v1
kind: Deployment
metadata:
  name: deploy-svc
  labels:
    app: myapp

spec:
  replicas: 5

  selector:
    matchLabels:
      app: myapp

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1

  template:
    metadata:
      labels:
        app: myapp

    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - name: nginx-port
          containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: deploy-svc
  labels:
    app: myapp

spec:
  selector:
    app: myapp

  ports:
  - name: nginx-port
    port: 80
    targetPort: 80